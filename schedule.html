<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule 2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1120;
    --ink-2:#0F1729;
    --panel:#121B30;
    --panel-2:#0F1729;
    --line:#232E47;
    --text:#F2EFE9;
    --text-dim:#9AA4BC;
    --slate:#3D4A66;
    --amber:#E8823C;
    --amber-dim:#E8823C22;
    --amber-line:#E8823C55;
    --error:#E85D5D;
    --good:#5FC79E;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--ink);
    color:var(--text);
    min-height:100vh;
    padding-bottom:64px;
  }

  /* ── Top rail: the whole day as one line ─────────────────────── */
  .daytrack{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--ink);
    border-bottom:1px solid var(--line);
    padding:14px 20px 12px;
  }
  .daytrack-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    max-width:820px;
    margin:0 auto 10px;
  }
  .daytrack-title{
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  .daytrack-now{
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
    color:var(--amber);
    font-weight:600;
  }
  .daytrack-right{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .logout-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:'Inter',sans-serif;
    font-size:0.78rem;
    font-weight:600;
    padding:6px 12px;
    border-radius:7px;
    cursor:pointer;
    transition:border-color 0.2s ease, color 0.2s ease;
  }
  .logout-btn:hover{ border-color:var(--error); color:var(--error); }
  .rail-outer{
    max-width:820px;
    margin:0 auto;
    height:6px;
    background:var(--panel);
    border-radius:99px;
    position:relative;
    overflow:visible;
  }
  .rail-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--amber), #F2A65A);
    border-radius:99px;
    transition:width 1s linear;
  }
  .rail-dot{
    position:absolute;
    top:50%;
    left:0%;
    width:12px;height:12px;
    background:var(--amber);
    border:2px solid var(--ink);
    border-radius:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 0 4px var(--amber-dim);
    transition:left 1s linear;
  }

  /* ── Hero countdown ──────────────────────────────────────────── */
  .hero{
    max-width:820px;
    margin:36px auto 28px;
    padding:0 20px;
    text-align:center;
  }
  .hero-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:10px;
  }
  .hero-label .accent{ color:var(--amber); }
  .hero-clock{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:clamp(3rem, 12vw, 5.5rem);
    letter-spacing:-0.02em;
    line-height:1;
    font-variant-numeric:tabular-nums;
    color:var(--text);
  }
  .hero-sub{
    margin-top:12px;
    font-size:1rem;
    color:var(--text-dim);
  }
  .hero-sub strong{ color:var(--text); font-weight:700; }

  /* ── Schedule list ────────────────────────────────────────────── */
  .section{
    max-width:820px;
    margin:0 auto;
    padding:0 20px;
  }
  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .section-head h2{
    font-size:1.1rem;
    font-weight:700;
  }
  .btn-add{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    font-weight:600;
    padding:9px 14px;
    border-radius:9px;
    cursor:pointer;
    transition:border-color 0.2s ease, transform 0.15s ease;
  }
  .btn-add:hover{ border-color:var(--amber); }
  .btn-add:active{ transform:scale(0.97); }

  .periods{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:36px;
  }

  .period{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--panel);
    border:1px solid var(--line);
    border-left:3px solid transparent;
    border-radius:10px;
    padding:14px 16px;
    position:relative;
    transition:border-left-color 0.4s ease, background 0.4s ease;
  }
  .period.current{
    border-left-color:var(--amber);
    background:linear-gradient(90deg, var(--amber-dim), var(--panel) 30%);
  }
  .period.past{ opacity:0.45; }

  .period-time{
    font-family:'JetBrains Mono', monospace;
    font-size:0.82rem;
    color:var(--text-dim);
    width:128px;
    flex-shrink:0;
    font-variant-numeric:tabular-nums;
  }
  .period.current .period-time{ color:var(--amber); font-weight:600; }

  .period-num{
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    color:var(--slate);
    width:22px;
    flex-shrink:0;
  }

  .period-info{ flex:1; min-width:0; }
  .period-name{
    font-weight:700;
    font-size:0.98rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .period-room{
    font-size:0.82rem;
    color:var(--text-dim);
    margin-top:2px;
  }

  .period-tag{
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--amber);
    background:var(--amber-dim);
    border:1px solid var(--amber-line);
    padding:4px 8px;
    border-radius:6px;
    flex-shrink:0;
  }

  .period-del{
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:1.1rem;
    padding:4px 8px;
    border-radius:6px;
    transition:color 0.2s ease, background 0.2s ease;
    flex-shrink:0;
  }
  .period-del:hover{ color:var(--error); background:#E85D5D18; }

  .empty{
    text-align:center;
    padding:40px 20px;
    border:1px dashed var(--line);
    border-radius:12px;
  }
  .empty-title{
    font-weight:700;
    font-size:1rem;
    color:var(--text);
    margin-bottom:6px;
  }
  .empty-sub{
    color:var(--text-dim);
    font-size:0.88rem;
  }

  /* ── Add period form (modal-ish inline panel) ───────────────────── */
  .addpanel{
    background:var(--panel);
    border:1px solid var(--amber-line);
    border-radius:12px;
    padding:20px;
    margin-bottom:36px;
    display:none;
    animation:slidein 0.3s cubic-bezier(.16,1,.3,1);
  }
  .addpanel.show{ display:block; }
  @keyframes slidein{
    from{opacity:0; transform:translateY(-8px);}
    to{opacity:1; transform:translateY(0);}
  }
  .addpanel-title{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--amber);
    margin-bottom:16px;
  }
  .row2{ display:flex; gap:12px; }
  .field{ margin-bottom:14px; flex:1; }
  .field label{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--ink-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:0.9rem;
    outline:none;
    transition:border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .field input:focus{
    border-color:var(--amber);
    box-shadow:0 0 0 3px var(--amber-dim);
  }
  .addpanel-actions{
    display:flex;
    gap:10px;
    margin-top:4px;
  }
  .btn-primary, .btn-ghost{
    flex:1;
    padding:11px 0;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:0.88rem;
    cursor:pointer;
    border:none;
    transition:transform 0.15s ease, background 0.2s ease;
  }
  .btn-primary{ background:var(--amber); color:#1A0F04; }
  .btn-primary:hover{ background:#F2954F; }
  .btn-primary:active{ transform:scale(0.98); }
  .btn-ghost{ background:transparent; border:1px solid var(--line); color:var(--text-dim); }
  .btn-ghost:hover{ border-color:var(--text-dim); color:var(--text); }

  .savebar{
    max-width:820px;
    margin:0 auto;
    padding:0 20px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
  }
  .savebar .btn-primary{ flex:none; padding:12px 24px; }
  .savebar .btn-ghost{ flex:none; padding:12px 20px; }
  .save-msg{
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
    color:var(--good);
    align-self:center;
    opacity:0;
    transition:opacity 0.3s ease;
  }
  .save-msg.show{ opacity:1; }

  @media (max-width:520px){
    .period-time{ width:94px; font-size:0.72rem; }
    .row2{ flex-direction:column; gap:0; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="daytrack">
  <div class="daytrack-head">
    <div class="daytrack-title">Today's progress</div>
    <div class="daytrack-right">
      <div class="daytrack-now" id="clockNow">--:--</div>
      <button class="logout-btn" onclick="handleLogout()">Log out</button>
    </div>
  </div>
  <div class="rail-outer">
    <div class="rail-fill" id="railFill"></div>
    <div class="rail-dot" id="railDot"></div>
  </div>
</div>

<div class="hero">
  <div class="hero-label"><span class="accent" id="heroState">Next period in</span></div>
  <div class="hero-clock" id="heroClock">--:--:--</div>
  <div class="hero-sub" id="heroSub">Nothing yet. Add a schedule to get started.</div>
</div>

<div class="section">
  <div class="section-head">
    <h2>Schedule</h2>
    <button class="btn-add" id="toggleAdd">+ Add period</button>
  </div>

  <div class="addpanel" id="addPanel">
    <div class="addpanel-title">New period</div>
    <div class="field">
      <label for="pName">Class name</label>
      <input type="text" id="pName" placeholder="AP Chemistry">
    </div>
    <div class="row2">
      <div class="field">
        <label for="pStart">Start time</label>
        <input type="time" id="pStart">
      </div>
      <div class="field">
        <label for="pEnd">End time</label>
        <input type="time" id="pEnd">
      </div>
    </div>
    <div class="field">
      <label for="pRoom">Room (optional)</label>
      <input type="text" id="pRoom" placeholder="Room 214">
    </div>
    <div class="addpanel-actions">
      <button class="btn-ghost" id="cancelAdd">Cancel</button>
      <button class="btn-primary" id="confirmAdd">Add to schedule</button>
    </div>
  </div>

  <div class="periods" id="periodsList">
    <div class="empty" id="emptyState">
      <div class="empty-title">Nothing yet</div>
      <div class="empty-sub">Add a schedule to get started.</div>
    </div>
  </div>
</div>

<div class="savebar">
  <span class="save-msg" id="saveMsg">Saved ✓</span>
  <button class="btn-ghost" id="clearAll">Clear all</button>
  <button class="btn-primary" id="saveSchedule">Save schedule</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBmD7gtaHTmrIE4Pl9q1746s-zoWvx6XAI",
    authDomain: "schedule2-a453d.firebaseapp.com",
    projectId: "schedule2-a453d",
    storageBucket: "schedule2-a453d.firebasestorage.app",
    messagingSenderId: "649246836060",
    appId: "1:649246836060:web:e6abd24d924e16b1206d99"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let tickStarted = false;

  // ── State ──────────────────────────────────────────────────────
  let periods = []; // {id, name, start:"HH:MM", end:"HH:MM", room}

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    currentUser = user;
    await loadSchedule();
  });

  async function loadSchedule(){
    try{
      const snap = await getDoc(doc(db, "schedules", currentUser.uid));
      if (snap.exists() && Array.isArray(snap.data().periods)) {
        periods = snap.data().periods;
      }
    } catch (err){
      console.error('Failed to load schedule:', err);
    }
    renderPeriods();
    tick();
    if (!tickStarted) {
      tickStarted = true;
      setInterval(tick, 1000);
    }
  }

  async function persistSchedule(){
    if(!currentUser) return;
    await setDoc(doc(db, "schedules", currentUser.uid), {
      periods,
      updatedAt: new Date().toISOString()
    });
  }

  window.handleLogout = function(){
    signOut(auth);
  };


  const toggleAdd = document.getElementById('toggleAdd');
  const addPanel = document.getElementById('addPanel');
  const cancelAdd = document.getElementById('cancelAdd');
  const confirmAdd = document.getElementById('confirmAdd');
  const periodsList = document.getElementById('periodsList');
  const emptyState = document.getElementById('emptyState');
  const saveSchedule = document.getElementById('saveSchedule');
  const saveMsg = document.getElementById('saveMsg');
  const clearAll = document.getElementById('clearAll');

  toggleAdd.addEventListener('click', () => {
    addPanel.classList.toggle('show');
    if(addPanel.classList.contains('show')) document.getElementById('pName').focus();
  });
  cancelAdd.addEventListener('click', () => {
    addPanel.classList.remove('show');
    clearForm();
  });

  function clearForm(){
    document.getElementById('pName').value='';
    document.getElementById('pStart').value='';
    document.getElementById('pEnd').value='';
    document.getElementById('pRoom').value='';
  }

  function toMinutes(hhmm){
    if(!hhmm) return null;
    const [h,m] = hhmm.split(':').map(Number);
    return h*60+m;
  }

  confirmAdd.addEventListener('click', () => {
    const name = document.getElementById('pName').value.trim();
    const start = document.getElementById('pStart').value;
    const end = document.getElementById('pEnd').value;
    const room = document.getElementById('pRoom').value.trim();

    if(!name || !start || !end){
      alert('Add a class name, start time, and end time.');
      return;
    }
    if(toMinutes(end) <= toMinutes(start)){
      alert('End time must be after start time.');
      return;
    }

    periods.push({
      id: Date.now().toString(36),
      name, start, end, room
    });
    periods.sort((a,b) => toMinutes(a.start) - toMinutes(b.start));

    clearForm();
    addPanel.classList.remove('show');
    renderPeriods();
  });

  clearAll.addEventListener('click', () => {
    if(periods.length && confirm('Remove all periods from today\'s schedule?')){
      periods = [];
      renderPeriods();
    }
  });

  window.removePeriod = function(id){
    periods = periods.filter(p => p.id !== id);
    renderPeriods();
  }

  function fmtTime(hhmm){
    const [h,m] = hhmm.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return `${h12}:${String(m).padStart(2,'0')} ${period}`;
  }

  function renderPeriods(){
    periodsList.innerHTML = '';
    if(periods.length === 0){
      periodsList.appendChild(emptyState);
      return;
    }
    const nowMin = new Date().getHours()*60 + new Date().getMinutes();

    periods.forEach((p, i) => {
      const startMin = toMinutes(p.start);
      const endMin = toMinutes(p.end);
      const isCurrent = nowMin >= startMin && nowMin < endMin;
      const isPast = nowMin >= endMin;

      const row = document.createElement('div');
      row.className = 'period' + (isCurrent ? ' current' : '') + (isPast ? ' past' : '');
      row.innerHTML = `
        <div class="period-num">${String(i+1).padStart(2,'0')}</div>
        <div class="period-time">${fmtTime(p.start)} to ${fmtTime(p.end)}</div>
        <div class="period-info">
          <div class="period-name">${escapeHtml(p.name)}</div>
          ${p.room ? `<div class="period-room">${escapeHtml(p.room)}</div>` : ''}
        </div>
        ${isCurrent ? '<div class="period-tag">Now</div>' : ''}
        <button class="period-del" onclick="removePeriod('${p.id}')" aria-label="Remove period">✕</button>
      `;
      periodsList.appendChild(row);
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  saveSchedule.addEventListener('click', async () => {
    saveSchedule.disabled = true;
    try{
      await persistSchedule();
      saveMsg.textContent = 'Saved ✓';
      saveMsg.classList.add('show');
    } catch(err){
      console.error('Save failed:', err);
      saveMsg.textContent = 'Save failed. Try again';
      saveMsg.style.color = 'var(--error)';
      saveMsg.classList.add('show');
    }
    saveSchedule.disabled = false;
    setTimeout(() => saveMsg.classList.remove('show'), 1800);
  });

  // ── Live clock + rail + hero countdown ──────────────────────────
  function pad(n){ return String(n).padStart(2,'0'); }

  function tick(){
    const now = new Date();
    const nowMin = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;

    document.getElementById('clockNow').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

    // day rail: from first period start to last period end
    if(periods.length){
      const dayStart = toMinutes(periods[0].start);
      const dayEnd = toMinutes(periods[periods.length-1].end);
      const span = Math.max(dayEnd - dayStart, 1);
      const pct = Math.min(Math.max((nowMin - dayStart) / span, 0), 1) * 100;
      document.getElementById('railFill').style.width = pct + '%';
      document.getElementById('railDot').style.left = pct + '%';
    } else {
      document.getElementById('railFill').style.width = '0%';
      document.getElementById('railDot').style.left = '0%';
    }

    // find current / next period
    let current = null, next = null;
    for(const p of periods){
      const s = toMinutes(p.start), e = toMinutes(p.end);
      if(nowMin >= s && nowMin < e){ current = p; break; }
    }
    if(!current){
      next = periods.find(p => toMinutes(p.start) > nowMin) || null;
    }

    const heroState = document.getElementById('heroState');
    const heroClock = document.getElementById('heroClock');
    const heroSub = document.getElementById('heroSub');

    if(current){
      const endMin = toMinutes(current.end);
      const secsLeft = Math.max(Math.round((endMin - nowMin) * 60), 0);
      heroState.textContent = `${current.name} ends in`;
      heroClock.textContent = secsToClock(secsLeft);
      heroSub.innerHTML = `Then: <strong>${next ? escapeHtml(getNextAfter(current)?.name || 'Free period') : 'Day complete'}</strong>`;
    } else if(next){
      const startMin = toMinutes(next.start);
      const secsLeft = Math.max(Math.round((startMin - nowMin) * 60), 0);
      heroState.textContent = `${next.name} starts in`;
      heroClock.textContent = secsToClock(secsLeft);
      heroSub.innerHTML = next.room ? `In <strong>${escapeHtml(next.room)}</strong>` : 'Get ready.';
    } else if(periods.length){
      heroState.textContent = 'Schedule complete';
      heroClock.textContent = '--:--:--';
      heroSub.textContent = 'No more periods today. Nice work.';
    } else {
      heroState.textContent = 'Next period in';
      heroClock.textContent = '--:--:--';
      heroSub.textContent = "Nothing yet. Add a schedule to get started.";
    }

    renderPeriods();
  }

  function getNextAfter(period){
    const idx = periods.findIndex(p => p.id === period.id);
    return periods[idx+1] || null;
  }

  function secsToClock(totalSecs){
    const h = Math.floor(totalSecs/3600);
    const m = Math.floor((totalSecs%3600)/60);
    const s = totalSecs%60;
    return h > 0
      ? `${pad(h)}:${pad(m)}:${pad(s)}`
      : `${pad(m)}:${pad(s)}`;
  }

  // tick() interval is started once inside loadSchedule(), after auth resolves.
</script>

</body>
</html>
